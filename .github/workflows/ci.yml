name: CI

on:
  push:
    branches: ["main", "issue-*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Run tests
        run: |
          set -o pipefail
          gradle test --no-daemon --stacktrace --console=plain 2>&1 | tee build/gradle-test.log
      - name: Print failure diagnostics
        if: failure()
        run: |
          echo "## Gradle output"
          tail -n 240 build/gradle-test.log || true
          echo "## Test XML"
          find build/test-results -type f -name "*.xml" -print -exec sed -n '1,220p' {} \; || true
          echo "## Reports"
          find build/reports -type f -maxdepth 6 -print || true
